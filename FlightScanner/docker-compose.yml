services:
  flightscanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flightscanner
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS:-http://+:8080}"
      AllowedHosts: "${AllowedHosts:-localhost}"
      FLIGHTSCANNER_DATABASE_URL: "${FLIGHTSCANNER_DATABASE_URL:-}"
      POSTGRES_URL: "${POSTGRES_URL:-}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:-flightscanner}"
      POSTGRES_USER: "${POSTGRES_USER:-flightscanner}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Portainer stack environment}"
      POSTGRES_SSL_MODE: "${POSTGRES_SSL_MODE:-Disable}"
      FLIGHTSCANNER_DATA_PROTECTION_KEYS_PATH: "${FLIGHTSCANNER_DATA_PROTECTION_KEYS_PATH:-/var/lib/flightscanner/keys}"
      FLIGHTSCANNER_USE_DUMMY_FLIGHT_DATA: "${FLIGHTSCANNER_USE_DUMMY_FLIGHT_DATA:-false}"
      LOCATION_DATA_IMPORT_ENABLED: "${LOCATION_DATA_IMPORT_ENABLED:-true}"
      LOCATION_DATA_IMPORT_REFRESH: "${LOCATION_DATA_IMPORT_REFRESH:-false}"
      LOCATION_IDENTIFIER_IMPORT_ENABLED: "${LOCATION_IDENTIFIER_IMPORT_ENABLED:-true}"
      LOCATION_IDENTIFIER_IMPORT_REFRESH: "${LOCATION_IDENTIFIER_IMPORT_REFRESH:-false}"
      LOCATION_IDENTIFIER_IMPORT_CITY_BATCH_SIZE: "${LOCATION_IDENTIFIER_IMPORT_CITY_BATCH_SIZE:-5000}"
      LOCATION_IDENTIFIER_IMPORT_MAX_CITY_PAGES: "${LOCATION_IDENTIFIER_IMPORT_MAX_CITY_PAGES:-200}"
      FLIGHT_PROVIDER_TYPE: "${FLIGHT_PROVIDER_TYPE:-SerpApi}"
      FLIGHT_PROVIDER_URL: "${FLIGHT_PROVIDER_URL:-}"
      FLIGHT_PROVIDER_HTTP_METHOD: "${FLIGHT_PROVIDER_HTTP_METHOD:-POST}"
      FLIGHT_PROVIDER_HEADERS_JSON: '${FLIGHT_PROVIDER_HEADERS_JSON:-{}}'
      FLIGHT_PROVIDER_BODY_TEMPLATE: "${FLIGHT_PROVIDER_BODY_TEMPLATE:-}"
      FLIGHT_PROVIDER_PRICE_JSON_PATH: "${FLIGHT_PROVIDER_PRICE_JSON_PATH:-$.offers[0].price}"
      FLIGHT_PROVIDER_CURRENCY_JSON_PATH: "${FLIGHT_PROVIDER_CURRENCY_JSON_PATH:-$.offers[0].currency}"
      FLIGHT_PROVIDER_URL_JSON_PATH: "${FLIGHT_PROVIDER_URL_JSON_PATH:-$.offers[0].url}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY:-}"
      SERPAPI_API_KEYS: "${SERPAPI_API_KEYS:-}"
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS:-true}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      WHATSAPP_API_URL: "${WHATSAPP_API_URL:-}"
      WHATSAPP_HTTP_METHOD: "${WHATSAPP_HTTP_METHOD:-POST}"
      WHATSAPP_HEADERS_JSON: '${WHATSAPP_HEADERS_JSON:-{}}'
      WHATSAPP_TO: "${WHATSAPP_TO:-}"
      WHATSAPP_BODY_TEMPLATE: "${WHATSAPP_BODY_TEMPLATE:-}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
    ports:
      - "18080:8080"
    volumes:
      - flightscanner_keys:/var/lib/flightscanner/keys
    networks:
      - flightscanner_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:8080/health || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  flightscanner_keys:

networks:
  flightscanner_internal:
    external: true
    name: ${DOCKER_NETWORK:-veoxer_internal}
